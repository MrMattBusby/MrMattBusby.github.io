<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: "Default"}}</title>

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="./assets/css/styles.css">
  <link rel="icon" href="/assets/favicon.png?w=32" sizes="32x32" type="png">
  <link rel="shortcut icon" href="/assets/favicon.png?w=32" sizes="32x32" type="image/png">
  2017/08/cropped-logo1.png?w=32" sizes="32x32"/>
</head>

<body>
  <main class="container">
    <header class="header">
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}
        <p class="subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </header>

    <section class="content">
      {{ content }}
    </section>
  </main>
</body>
</html>
